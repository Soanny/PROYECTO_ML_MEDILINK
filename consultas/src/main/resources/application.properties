spring.application.name=consultas
server.port=${PORT:${ML_SERVER_PORT:8087}}

# BASE DE DATOS DEL PROYECTO CONSULTAS
# Usa exclusivamente la base proporcionada: bd_citas_medicas.
# Puedes cambiar usuario/clave mediante variables de entorno sin tocar el código.
spring.datasource.url=${ML_DB_URL:jdbc:mysql://localhost:3306/bd_citas_medicas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima}
spring.datasource.username=${ML_DB_USER:root}
spring.datasource.password=${ML_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Configuración compartida por la versión web y la versión de escritorio.
ml.desktop.db.url=${ML_DB_URL:jdbc:mysql://localhost:3306/bd_citas_medicas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima}
ml.desktop.db.user=${ML_DB_USER:root}
ml.desktop.db.password=${ML_DB_PASSWORD:}

# Correo automatico externo por SMTP.
# Habilitado por defecto. Configura ML_MAIL_PASSWORD como variable de entorno.
# Para Gmail, genera una contraseña de aplicacion en: https://myaccount.google.com/apppasswords
ml.mail.enabled=${ML_MAIL_ENABLED:true}
ml.mail.from=${ML_MAIL_FROM:soannyrg@gmail.com}
ml.mail.from-name=${ML_MAIL_FROM_NAME:MediLink CONSULTAS}
spring.mail.host=${ML_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${ML_MAIL_PORT:587}
spring.mail.username=${ML_MAIL_USER:soannyrg@gmail.com}
spring.mail.password=${ML_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${ML_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${ML_MAIL_SMTP_TLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${ML_MAIL_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=${ML_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${ML_MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${ML_MAIL_TIMEOUT:5000}

# Microservicio opcional de correo. Si no se usa, la aplicacion envia por SMTP local del proyecto.
ml.microservicio.correo.enabled=${ML_MICROSERVICIO_CORREO_ENABLED:false}
ml.microservicio.correo.url=${ML_MICROSERVICIO_CORREO_URL:http://localhost:8091}
