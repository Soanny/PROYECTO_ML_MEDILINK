spring.application.name=ML_correo_service
server.port=${PORT:${ML_CORREO_SERVER_PORT:8091}}
ml.mail.from=${ML_MAIL_FROM:notificaciones@medilink.local}
ml.mail.from-name=${ML_MAIL_FROM_NAME:MediLink CONSULTAS}
spring.mail.host=${ML_MAIL_HOST:}
spring.mail.port=${ML_MAIL_PORT:587}
spring.mail.username=${ML_MAIL_USER:}
spring.mail.password=${ML_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${ML_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${ML_MAIL_SMTP_TLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
